name: Scheduled SERP Checks

on:
  schedule:
    - cron: "0 8,13,19 * * *"   # SERP checks 3x daily
    - cron: "0 6 * * *"         # Auction insights daily
  workflow_dispatch:             # Allow manual trigger

jobs:
  run-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Determine which cron to run
        id: cron
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "06" ]; then
            echo "path=/api/cron/auction-insights" >> $GITHUB_OUTPUT
            echo "name=auction-insights" >> $GITHUB_OUTPUT
          else
            echo "path=/api/cron/serp-check" >> $GITHUB_OUTPUT
            echo "name=serp-check" >> $GITHUB_OUTPUT
          fi

      - name: Trigger ${{ steps.cron.outputs.name }}
        run: |
          response=$(curl -s -w "
%{http_code}" --max-time 300 \
            "${{ secrets.APP_URL }}${{ steps.cron.outputs.path }}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "HTTP $http_code"
          echo "$body"
          if [ "$http_code" -ge 400 ] && [ "$http_code" != "409" ]; then
            echo "::error::Cron job failed with HTTP $http_code"
            exit 1
          fi

